# Deploy static site to Google App Engine when website files change on main.
#
# Required (Settings → Secrets and variables → Actions):
#   GCP_SA_KEY       — Secret: full JSON body of a service account key
#   GCP_PROJECT_ID   — Secret OR Variables: project id (e.g. esport-trajectories). Variables work if you prefer not to duplicate as a secret.
#
# If auth fails with "must specify workload_identity_provider or credentials_json":
#   - Secrets are missing or empty on THIS repo (add them on the repo that runs the workflow).
#   - Workflows triggered from a fork do NOT receive secrets; merge/run on the upstream repo instead.
#
# Service account roles (minimum useful set):
#   - App Engine Deploy Admin (roles/appengine.deployAdmin)
#   - Cloud Build Editor (roles/cloudbuild.builds.editor)
#   - Service Account User on the App Engine default SA (roles/iam.serviceAccountUser)

name: Deploy website to App Engine

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-appspot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Quiets Node 20 deprecation until all actions default to Node 24 (see GitHub changelog)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # secrets/vars in env only — check in shell (do not echo key). Project id: secret OR repo variable.
      - name: Verify GCP configuration
        id: gcp
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SECRET_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          VAR_PROJECT: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          PROJECT_ID="${SECRET_PROJECT:-${VAR_PROJECT:-}}"
          if [ -z "${GCP_SA_KEY}" ]; then
            echo "::error::GCP_SA_KEY secret is missing or empty."
            echo "Add it under Settings → Secrets and variables → Actions (Repository secrets)."
            echo "Fork PRs do not receive secrets—run this workflow on the upstream repo."
            exit 1
          fi
          if [ -z "${PROJECT_ID}" ]; then
            echo "::error::GCP project id is missing."
            echo "Set repository secret GCP_PROJECT_ID or repository variable GCP_PROJECT_ID (e.g. esport-trajectories)."
            exit 1
          fi
          echo "Resolved GCP project id: ${PROJECT_ID}"
          echo "project_id=${PROJECT_ID}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ steps.gcp.outputs.project_id }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to App Engine
        env:
          PROJECT_ID: ${{ steps.gcp.outputs.project_id }}
        run: |
          set -euo pipefail
          gcloud app deploy website/app.yaml --quiet --project="${PROJECT_ID}"
